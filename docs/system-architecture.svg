<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1050" viewBox="0 0 1400 1050">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 15px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 13px Arial, sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .blue { fill: #eff6ff; stroke: #2563eb; }
      .green { fill: #ecfdf5; stroke: #059669; }
      .amber { fill: #fffbeb; stroke: #d97706; }
      .red { fill: #fef2f2; stroke: #dc2626; }
      .purple { fill: #faf5ff; stroke: #9333ea; }
      .dark { fill: #0f172a; stroke: #1e40af; }
      .darkText { fill: #ffffff; font: 700 15px Arial, sans-serif; }
      .darkSmall { fill: #dbeafe; font: 500 13px Arial, sans-serif; }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>

  <rect width="1400" height="1050" fill="#f8fafc"/>
  <text x="700" y="48" text-anchor="middle" class="title">Hospital Management Portal - System Architecture</text>

  <rect x="70" y="95" width="250" height="75" class="box blue"/>
  <text x="195" y="124" text-anchor="middle" class="label">Hospital Staff User</text>
  <text x="195" y="148" text-anchor="middle" class="small">Doctor, Nurse, Admin, Operator</text>

  <rect x="405" y="95" width="260" height="75" class="box dark"/>
