  <text x="150" y="584" text-anchor="middle" class="small">health_records</text>

  <rect x="270" y="535" width="180" height="62" class="box blue"/>
  <text x="360" y="562" text-anchor="middle" class="label">Appointments</text>
  <text x="360" y="584" text-anchor="middle" class="small">appointments</text>

  <rect x="480" y="535" width="180" height="62" class="box blue"/>
  <text x="570" y="562" text-anchor="middle" class="label">Lab Reports</text>
  <text x="570" y="584" text-anchor="middle" class="small">diagnostic_reports</text>

  <rect x="690" y="535" width="180" height="62" class="box blue"/>
  <text x="780" y="562" text-anchor="middle" class="label">Bed Management</text>
  <text x="780" y="584" text-anchor="middle" class="small">beds / wards</text>

  <rect x="900" y="535" width="180" height="62" class="box blue"/>
  <text x="990" y="562" text-anchor="middle" class="label">Medicine Stock</text>
  <text x="990" y="584" text-anchor="middle" class="small">medicine_stock</text>

  <rect x="1110" y="535" width="220" height="62" class="box blue"/>
  <text x="1220" y="562" text-anchor="middle" class="label">Infrastructure</text>
  <text x="1220" y="584" text-anchor="middle" class="small">equipment / ambulances</text>

  <rect x="225" y="650" width="180" height="62" class="box blue"/>
  <text x="315" y="677" text-anchor="middle" class="label">Referrals</text>
  <text x="315" y="699" text-anchor="middle" class="small">referrals</text>

  <rect x="440" y="650" width="180" height="62" class="box blue"/>
  <text x="530" y="677" text-anchor="middle" class="label">Complaints</text>
  <text x="530" y="699" text-anchor="middle" class="small">complaints</text>

  <rect x="655" y="650" width="210" height="62" class="box blue"/>
  <text x="760" y="677" text-anchor="middle" class="label">Disease Analytics</text>
  <text x="760" y="699" text-anchor="middle" class="small">disease_cases / diseases</text>

  <path d="M872 435 C870 505, 150 485, 150 535" class="dash"/>
  <path d="M872 435 C870 505, 360 485, 360 535" class="dash"/>
  <path d="M872 435 C870 505, 570 485, 570 535" class="dash"/>
  <path d="M872 435 C870 505, 780 485, 780 535" class="dash"/>
  <path d="M872 435 C890 505, 990 485, 990 535" class="dash"/>
  <path d="M872 435 C950 505, 1220 485, 1220 535" class="dash"/>
  <path d="M872 435 C760 610, 315 600, 315 650" class="dash"/>
  <path d="M872 435 C820 610, 530 600, 530 650" class="dash"/>
  <path d="M872 435 C850 610, 760 600, 760 650" class="dash"/>

