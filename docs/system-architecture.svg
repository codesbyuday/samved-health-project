  <text x="595" y="813" text-anchor="middle" class="label">Supabase Storage</text>
  <text x="595" y="836" text-anchor="middle" class="small">Private Lab Reports Bucket</text>

  <rect x="760" y="785" width="230" height="70" class="box green"/>
  <text x="875" y="813" text-anchor="middle" class="label">Signed URL API</text>
  <text x="875" y="836" text-anchor="middle" class="small">Secure View / Download</text>

  <path d="M570 597 L595 785" class="line"/>
  <path d="M710 820 L760 820" class="line"/>

  <rect x="70" y="785" width="180" height="70" class="box purple"/>
  <text x="160" y="813" text-anchor="middle" class="label">Health Card QR</text>
  <text x="160" y="836" text-anchor="middle" class="small">Scan Patient Card</text>

  <rect x="70" y="905" width="220" height="70" class="box purple"/>
  <text x="180" y="933" text-anchor="middle" class="label">Citizen Health Profile</text>
  <text x="180" y="956" text-anchor="middle" class="small">Appointments, Reports, Records</text>

  <path d="M160 855 L180 905" class="line"/>
  <path d="M290 940 C430 940, 150 690, 150 597" class="line"/>

  <rect x="1080" y="785" width="250" height="70" class="box amber"/>
  <text x="1205" y="813" text-anchor="middle" class="label">Public Landing Page</text>
  <text x="1205" y="836" text-anchor="middle" class="small">Aggregated Health Analytics</text>

  <rect x="1080" y="905" width="250" height="70" class="box amber"/>
  <text x="1205" y="933" text-anchor="middle" class="label">/api/public-analytics</text>
  <text x="1205" y="956" text-anchor="middle" class="small">No Personal Citizen Data</text>

  <path d="M1205 855 L1205 905" class="line"/>
  <path d="M1080 940 C930 930, 760 760, 760 712" class="line"/>
