  <text x="535" y="148" text-anchor="middle" class="darkSmall">Hospital Management Portal</text>

  <rect x="750" y="95" width="245" height="75" class="box blue"/>
  <text x="872" y="124" text-anchor="middle" class="label">Login Page</text>
  <text x="872" y="148" text-anchor="middle" class="small">Email/Phone + Password</text>

  <rect x="1080" y="95" width="250" height="75" class="box green"/>
  <text x="1205" y="124" text-anchor="middle" class="label">Next.js API Routes</text>
  <text x="1205" y="148" text-anchor="middle" class="small">/api/login, /api/profile</text>

  <path d="M320 132 L405 132" class="line"/>
  <path d="M665 132 L750 132" class="line"/>
  <path d="M995 132 L1080 132" class="line"/>

  <rect x="980" y="225" width="170" height="70" class="box amber"/>
  <text x="1065" y="253" text-anchor="middle" class="label">auth_users</text>
  <text x="1065" y="276" text-anchor="middle" class="small">Custom Auth</text>

  <rect x="1185" y="225" width="170" height="70" class="box amber"/>
  <text x="1270" y="253" text-anchor="middle" class="label">hospital_staff</text>
  <text x="1270" y="276" text-anchor="middle" class="small">Staff Profile</text>

  <rect x="1082" y="340" width="170" height="70" class="box amber"/>
  <text x="1167" y="368" text-anchor="middle" class="label">hospitals</text>
